version: "3.9"

services:

  # ── GRAPH DATABASE ─────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: pandora-neo4j
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-pandora_secret}
      NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "1g"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── VECTOR DATABASE ────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: pandora-qdrant
    ports:
      - "6333:6333"   # HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── POSTGRES (via Supabase-compatible schema) ──────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pandora-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pandora
      POSTGRES_USER: pandora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pandora_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init_all.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pandora"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── REDIS (task queue + cache) ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: pandora-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── FASTAPI BACKEND ────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pandora-api
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-pandora_secret}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_DSN=postgresql+asyncpg://pandora:${POSTGRES_PASSWORD:-pandora_secret}@postgres:5432/pandora
      - REDIS_URL=redis://redis:6379/0
      - NVIDIA_NIM_BASE_URL=${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - NIM_CHAT_MODEL=${NIM_CHAT_MODEL:-meta/llama-3.1-70b-instruct}
      - NIM_EMBED_MODEL=${NIM_EMBED_MODEL:-nvidia/nv-embedqa-e5-v5}
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── CELERY WORKER (ingestion + extraction tasks) ───────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pandora-worker
    environment:
      - ENV=development
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-pandora_secret}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_DSN=postgresql+asyncpg://pandora:${POSTGRES_PASSWORD:-pandora_secret}@postgres:5432/pandora
      - REDIS_URL=redis://redis:6379/0
      - NVIDIA_NIM_BASE_URL=${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - NIM_CHAT_MODEL=${NIM_CHAT_MODEL:-meta/llama-3.1-70b-instruct}
      - NIM_EMBED_MODEL=${NIM_EMBED_MODEL:-nvidia/nv-embedqa-e5-v5}
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - neo4j
      - qdrant
      - postgres
    command: celery -A core.celery_app worker --loglevel=info --concurrency=4 -Q ingestion,extraction,discovery
    restart: unless-stopped

  # ── CELERY BEAT (scheduled discovery scans) ────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pandora-beat
    environment:
      - ENV=development
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-pandora_secret}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_DSN=postgresql+asyncpg://pandora:${POSTGRES_PASSWORD:-pandora_secret}@postgres:5432/pandora
      - REDIS_URL=redis://redis:6379/0
      - NVIDIA_NIM_BASE_URL=${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - NIM_CHAT_MODEL=${NIM_CHAT_MODEL:-meta/llama-3.1-70b-instruct}
      - NIM_EMBED_MODEL=${NIM_EMBED_MODEL:-nvidia/nv-embedqa-e5-v5}
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    command: celery -A core.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    restart: unless-stopped

  # ── NEXT.JS FRONTEND ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pandora-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  qdrant_data:
  postgres_data:
  redis_data:
